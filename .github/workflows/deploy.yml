name: Deploy to Firebase Hosting

# Build the PWA and publish it to Firebase Hosting on every push to main.
on:
  push:
    branches: [main]

# Allow one deploy at a time; newer pushes cancel an in-flight run.
concurrency:
  group: firebase-hosting
  cancel-in-progress: true

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: spinningwheel-6ff51
          channelId: live # deploy straight to the live site (not a preview channel)
